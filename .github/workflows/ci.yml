# ============================================
# 永颐无机磨石 · GitHub Actions CI
# 自动测试 + 构建检查
# ============================================

name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask gunicorn pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check . --ignore=E402,F401 --quiet || true

    - name: Test with pytest
      run: |
        python -m pytest tests/ -v --tb=short --junitxml=report.xml

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: report.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t yongyi-terrazzo:latest .

    - name: Test Docker image
      run: |
        docker run -d -p 5000:5000 --name test-app yongyi-terrazzo:latest
        sleep 5
        curl -s -o /dev/null -w "Healthcheck: %{http_code}\n" http://localhost:5000/api/params
        docker stop test-app && docker rm test-app

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to production
      run: |
        echo "🚀 部署到生产环境"
        echo "   项目: 永颐无机磨石 · 施工管理平台"
        echo "   版本: v3.4.0"
        echo "   API: 29+ 个端点"
        echo "   测试: 46+ 个用例"
