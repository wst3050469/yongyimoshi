<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容日历 · 永颐无机磨石</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f0f2f5; color:#333; padding:20px; }
        .header { max-width:1200px; margin:0 auto 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
        .header h1 { font-size:1.5rem; color:#1a5276; }
        .header p { color:#888; font-size:0.85rem; }
        .week-grid { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
        .day-card { background:white; border-radius:12px; padding:12px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
        .day-card .day-name { font-size:0.85rem; font-weight:600; color:#1a5276; margin-bottom:4px; }
        .day-card .date { font-size:0.75rem; color:#999; margin-bottom:8px; }
        .slot { padding:6px 8px; border-radius:6px; margin-bottom:4px; font-size:0.75rem; cursor:pointer; transition:all 0.2s; position:relative; }
        .slot:hover { transform:translateX(2px); }
        .slot-a { background:#fce4ec; border-left:3px solid #e74c3c; }
        .slot-b { background:#fff8e1; border-left:3px solid #f39c12; }
        .slot-c { background:#e8f5e9; border-left:3px solid #27ae60; }
        .slot-d { background:#e3f2fd; border-left:3px solid #2980b9; }
        .slot .label { font-weight:600; font-size:0.7rem; }
        .slot .hook-text { margin-top:2px; color:#555; font-size:0.7rem; line-height:1.3; overflow:hidden; text-overflow:ellipsis; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
        .slot .check { position:absolute; top:4px; right:4px; font-size:0.8rem; }
        .slot.done { opacity:0.5; }
        .controls { max-width:1200px; margin:16px auto; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .btn { padding:8px 16px; border:none; border-radius:8px; cursor:pointer; font-size:0.85rem; }
        .btn-primary { background:#1a5276; color:white; }
        .btn-success { background:#27ae60; color:white; }
        .btn-outline { background:white; border:1px solid #ddd; }
        .stats { font-size:0.85rem; color:#666; }
        .legend { max-width:1200px; margin:12px auto; display:flex; gap:16px; font-size:0.8rem; color:#666; flex-wrap:wrap; }
        .legend span { display:flex; align-items:center; gap:4px; }
        .legend .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
        .empty-state { grid-column:1/-1; text-align:center; padding:60px 20px; color:#999; }
        .empty-state .big { font-size:2rem; margin-bottom:8px; }
        @media (max-width:768px) { .week-grid { grid-template-columns:repeat(1,1fr); } }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>📅 4号矩阵 · 内容日历</h1>
            <p>追踪每日发布 · 点击切换已发布状态</p>
        </div>
        <span class="stats" id="statsText">加载中...</span>
    </div>
    <div class="controls">
        <button class="btn btn-primary" onclick="loadCalendar()">🔄 刷新</button>
        <button class="btn btn-success" onclick="generatePlan()">✨ 生成本周排期</button>
        <button class="btn btn-outline" onclick="resetAll()">🗑️ 重置标记</button>
    </div>
    <div class="legend">
        <span><span class="dot" style="background:#e74c3c;"></span> 🔴 号A·专家</span>
        <span><span class="dot" style="background:#f39c12;"></span> 🟡 号B·工地</span>
        <span><span class="dot" style="background:#27ae60;"></span> 🟢 号C·科普</span>
        <span><span class="dot" style="background:#2980b9;"></span> 🔵 号D·工具</span>
    </div>
    <div class="week-grid" id="weekGrid"><div class="empty-state"><div class="big">⏳</div>加载排期中...</div></div>

    <script>
        const ACCOUNTS = [
            {id:'A', name:'专家', emoji:'🔴', cls:'slot-a'},
            {id:'B', name:'工地', emoji:'🟡', cls:'slot-b'},
            {id:'C', name:'科普', emoji:'🟢', cls:'slot-c'},
            {id:'D', name:'工具', emoji:'🔵', cls:'slot-d'}
        ];
        const DAY_NAMES = ['周一','周二','周三','周四','周五','周六','周日'];

        function getWeekDates() {
            const now = new Date();
            const day = now.getDay() || 7;
            const monday = new Date(now);
            monday.setDate(now.getDate() - day + 1);
            return DAY_NAMES.map((name,i) => {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);
                return {name, date: `${d.getMonth()+1}/${d.getDate()}`, iso: d.toISOString().slice(0,10)};
            });
        }

        function loadCalendar() {
            const grid = document.getElementById('weekGrid');
            const days = getWeekDates();
            const posted = JSON.parse(localStorage.getItem('yongyi_calendar') || '{}');
            const hooks = JSON.parse(localStorage.getItem('yongyi_hooks') || '{}');

            grid.innerHTML = days.map(day => {
                return `<div class="day-card">
                    <div class="day-name">${day.name}</div>
                    <div class="date">${day.date}</div>
                    ${ACCOUNTS.map(acc => {
                        const isDone = posted[day.iso]?.[acc.id];
                        const hookText = hooks[day.iso]?.[acc.id] || '待定';
                        return `<div class="slot ${acc.cls} ${isDone?'done':''}" onclick="togglePosted('${day.iso}','${acc.id}')">
                            <span class="check">${isDone ? '✅' : '○'}</span>
                            <div class="label">${acc.emoji} ${acc.name}</div>
                            <div class="hook-text">${hookText}</div>
                        </div>`;
                    }).join('')}
                </div>`;
            }).join('');
            updateStats(posted);
            loadPlanFromServer();
        }

        function loadPlanFromServer() {
            fetch('/api/content/plan-preview').then(r=>r.json()).then(data => {
                if (data.has_plan && data.next_day_preview) {
                    // Parse hooks from preview text
                    const lines = data.next_day_preview.split('\\n');
                    const hooks = JSON.parse(localStorage.getItem('yongyi_hooks') || '{}');
                    const days = getWeekDates();
                    
                    let currentDay = days[0]?.iso;
                    let accIndex = -1;
                    const accIds = ['A','B','C','D'];
                    
                    lines.forEach(line => {
                        const dayMatch = line.match(/^## .+ (\d+\/\d+)/);
                        if (dayMatch) {
                            const [m,d] = dayMatch[1].split('/');
                            const today = new Date();
                            const targetDate = new Date(today.getFullYear(), parseInt(m)-1, parseInt(d));
                            currentDay = targetDate.toISOString().slice(0,10);
                            accIndex = -1;
                            return;
                        }
                        if (line.includes('号') && line.includes('·')) {
                            accIndex = line.includes('🔴') ? 0 : line.includes('🟡') ? 1 : line.includes('🟢') ? 2 : line.includes('🔵') ? 3 : -1;
                            return;
                        }
                        if (line.includes('【钩子】') && accIndex >= 0) {
                            const hook = line.replace('【钩子】','').trim();
                            if (!hooks[currentDay]) hooks[currentDay] = {};
                            hooks[currentDay][accIds[accIndex]] = hook;
                        }
                    });
                    localStorage.setItem('yongyi_hooks', JSON.stringify(hooks));
                    loadCalendar();
                }
            }).catch(() => {});
        }

        function togglePosted(iso, accId) {
            const posted = JSON.parse(localStorage.getItem('yongyi_calendar') || '{}');
            if (!posted[iso]) posted[iso] = {};
            posted[iso][accId] = !posted[iso][accId];
            localStorage.setItem('yongyi_calendar', JSON.stringify(posted));
            loadCalendar();
        }

        function updateStats(posted) {
            const total = Object.values(posted).reduce((sum, day) => sum + Object.keys(day).length, 0);
            document.getElementById('statsText').textContent = `📊 已发布 ${total}/28 条`;
        }

        function generatePlan() {
            document.getElementById('statsText').textContent = '⏳ 生成中...';
            fetch('/api/content/plan', {method:'POST'}).then(r=>r.json()).then(d => {
                document.getElementById('statsText').textContent = d.status==='ok' ? `✅ 已生成 ${d.count} 条` : '⚠️ 失败';
                setTimeout(loadCalendar, 1000);
            }).catch(() => {});
        }

        function resetAll() {
            if (confirm('确定重置所有发布标记？')) {
                localStorage.removeItem('yongyi_calendar');
                localStorage.removeItem('yongyi_hooks');
                loadCalendar();
            }
        }

        loadCalendar();
    </script>
</body>
</html>
