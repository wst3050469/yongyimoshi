<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 永颐无机磨石</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #1a5276 0%, #2e86c1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 380px;
            max-width: 90vw;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            font-size: 22px;
            color: #1a5276;
            margin: 0 0 6px 0;
        }
        .login-header p {
            font-size: 13px;
            color: #7f8c8d;
            margin: 0;
        }
        .login-header .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2e86c1;
        }
        .login-btn {
            width: 100%;
            padding: 13px;
            background: #2e86c1;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #1a5276;
        }
        .login-btn:disabled {
            background: #85c1e9;
            cursor: not-allowed;
        }
        .error-msg {
            background: #fadbd8;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #95a5a6;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <span class="logo-icon">🧱</span>
            <h1>永颐无机磨石</h1>
            <p>施工管理平台 · 请登录</p>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">登 录</button>
        </form>
        <div class="footer">
            <p>浙江永颐装饰工程有限公司</p>
            <p style="margin-top:4px;font-size:11px;color:#bbb">默认管理员: admin / admin123</p>
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            errorEl.classList.remove('show');
            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.error || '登录失败';
                    errorEl.classList.add('show');
                }
            } catch (err) {
                errorEl.textContent = '网络错误，请重试';
                errorEl.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
            return false;
        }

        // 回车提交
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
    </script>
</body>
</html>
