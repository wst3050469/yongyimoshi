<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>环境监测 - 永颐无机磨石</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        .env-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .env-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .env-header h2 { margin: 0; color: #1a5276; }
        .env-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
        .stat-card .value { font-size: 24px; font-weight: 700; color: #2e86c1; }
        .stat-card .label { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
        .stat-card .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 4px; }
        .badge-ok { background: #d5f5e3; color: #27ae60; }
        .badge-warn { background: #fdebd0; color: #e67e22; }
        .badge-danger { background: #fadbd8; color: #c0392b; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .chart-card { background: white; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .chart-card h3 { margin: 0 0 12px 0; font-size: 15px; color: #2c3e50; }
        .chart-card canvas { max-height: 250px; }
        .record-form { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
        .form-row input, .form-row select { padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        .form-row input:focus, .form-row select:focus { outline: none; border-color: #2e86c1; }
        .record-table { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .record-table table { width: 100%; border-collapse: collapse; }
        .record-table th { background: #f8f9fa; padding: 10px 12px; text-align: left; font-size: 13px; color: #2c3e50; border-bottom: 2px solid #e0e0e0; }
        .record-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #f0f0f0; }
        .record-table tr:hover { background: #f8f9fa; }
        .record-table .delete-btn { color: #e74c3c; cursor: pointer; font-size: 12px; }
        .empty-state { text-align: center; padding: 40px; color: #95a5a6; }
        @media (max-width: 768px) { .chart-row { grid-template-columns: 1fr; } }
        .btn { padding: 8px 20px; background: #2e86c1; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn:hover { background: #1a5276; }
        .btn-secondary { background: #95a5a6; }
        .btn-secondary:hover { background: #7f8c8d; }
        .project-selector { padding: 8px 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
    </style>
<script>!function(){var t=localStorage.getItem("yongyi_theme")||"light";document.documentElement.setAttribute("data-theme",t)}()</script>
</head>
<body>
{% include 'sidebar.html' %}
    <div class="env-container">
        <div class="env-header">
            <h2>🌡️ 环境监测</h2>
            <div>
                <select class="project-selector" id="projectSelect" onchange="loadData()"></select>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="env-stats" id="statsCards">
            <div class="stat-card"><div class="value">--</div><div class="label">记录总数</div></div>
            <div class="stat-card"><div class="value">--</div><div class="label">平均温度</div></div>
            <div class="stat-card"><div class="value">--</div><div class="label">温度范围</div></div>
            <div class="stat-card"><div class="value">--</div><div class="label">平均湿度</div></div>
            <div class="stat-card"><div class="value">--</div><div class="label">湿度范围</div></div>
            <div class="stat-card"><div class="value">--</div><div class="label">平均含水率</div></div>
        </div>

        <!-- 图表 -->
        <div class="chart-row">
            <div class="chart-card">
                <h3>📈 温度趋势</h3>
                <canvas id="tempChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>📈 湿度趋势</h3>
                <canvas id="humidityChart"></canvas>
            </div>
        </div>

        <!-- 添加记录 -->
        <div class="record-form">
            <h3 style="margin:0 0 16px 0;font-size:15px;color:#2c3e50">➕ 添加记录</h3>
            <div class="form-row">
                <input type="date" id="recDate">
                <input type="time" id="recTime">
                <input type="number" id="recTemp" placeholder="温度 ℃" step="0.1">
                <input type="number" id="recHumidity" placeholder="湿度 %" step="0.1">
                <input type="number" id="recMoisture" placeholder="含水率 %" step="0.1">
                <input type="text" id="recWeather" placeholder="天气（如：晴）">
                <input type="text" id="recRecorder" placeholder="记录人">
            </div>
            <div style="margin-top:12px;display:flex;gap:8px">
                <button class="btn" onclick="addRecord()">保存记录</button>
                <button class="btn btn-secondary" onclick="clearForm()">清空</button>
            </div>
        </div>

        <!-- 记录列表 -->
        <div class="record-table">
            <table>
                <thead>
                    <tr>
                        <th>日期</th><th>时间</th><th>温度(℃)</th><th>湿度(%)</th>
                        <th>含水率(%)</th><th>天气</th><th>记录人</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="recordsBody">
                    <tr><td colspan="8" class="empty-state">暂无数据</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let tempChart = null, humidityChart = null;

        async function loadProjects() {
            const res = await fetch('/api/projects');
            const projects = await res.json();
            const sel = document.getElementById('projectSelect');
            sel.innerHTML = projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            if (projects.length > 0) loadData();
        }

        async function loadData() {
            const pid = document.getElementById('projectSelect').value;
            if (!pid) return;
            await Promise.all([loadStats(pid), loadRecords(pid), loadCharts(pid)]);
        }

        async function loadStats(pid) {
            const res = await fetch(`/api/environment/stats?project_id=${pid}`);
            const s = await res.json();
            const cards = document.querySelectorAll('#statsCards .stat-card');
            cards[0].querySelector('.value').textContent = s.total_records || 0;
            cards[1].querySelector('.value').textContent = (s.avg_temp || 0).toFixed(1) + '℃';
            cards[2].querySelector('.value').textContent = (s.min_temp || 0).toFixed(1) + '~' + (s.max_temp || 0).toFixed(1) + '℃';
            cards[3].querySelector('.value').textContent = (s.avg_humidity || 0).toFixed(1) + '%';
            cards[4].querySelector('.value').textContent = (s.min_humidity || 0).toFixed(1) + '~' + (s.max_humidity || 0).toFixed(1) + '%';
            cards[5].querySelector('.value').textContent = s.avg_base_moisture ? (s.avg_base_moisture).toFixed(1) + '%' : '--';
        }

        async function loadRecords(pid) {
            const res = await fetch(`/api/environment?project_id=${pid}&days=90`);
            const records = await res.json();
            const tbody = document.getElementById('recordsBody');
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-state">暂无数据</td></tr>';
                return;
            }
            tbody.innerHTML = records.map(r => `
                <tr>
                    <td>${r.record_date}</td>
                    <td>${r.record_time || '--'}</td>
                    <td>${r.temperature || 0}℃</td>
                    <td>${r.humidity || 0}%</td>
                    <td>${r.base_moisture !== null ? r.base_moisture + '%' : '--'}</td>
                    <td>${r.weather_condition || '--'}</td>
                    <td>${r.recorder || '--'}</td>
                    <td><span class="delete-btn" onclick="deleteRecord(${r.id})">🗑️</span></td>
                </tr>
            `).join('');
        }

        async function loadCharts(pid) {
            const res = await fetch(`/api/environment?project_id=${pid}&days=30`);
            const records = await res.json();
            const labels = records.map(r => r.record_date + (r.record_time ? ' ' + r.record_time : '')).reverse();
            const temps = records.map(r => r.temperature || 0).reverse();
            const humids = records.map(r => r.humidity || 0).reverse();

            if (tempChart) tempChart.destroy();
            if (humidityChart) humidityChart.destroy();

            const ctx1 = document.getElementById('tempChart').getContext('2d');
            tempChart = new Chart(ctx1, {
                type: 'line',
                data: { labels, datasets: [{ label: '温度(℃)', data: temps, borderColor: '#e74c3c', backgroundColor: 'rgba(231,76,60,0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false } } }
            });

            const ctx2 = document.getElementById('humidityChart').getContext('2d');
            humidityChart = new Chart(ctx2, {
                type: 'line',
                data: { labels, datasets: [{ label: '湿度(%)', data: humids, borderColor: '#2e86c1', backgroundColor: 'rgba(46,134,193,0.1)', fill: true, tension: 0.3 }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false } } }
            });
        }

        async function addRecord() {
            const pid = document.getElementById('projectSelect').value;
            if (!pid) return alert('请选择项目');
            const data = {
                project_id: parseInt(pid),
                record_date: document.getElementById('recDate').value,
                record_time: document.getElementById('recTime').value,
                temperature: parseFloat(document.getElementById('recTemp').value) || 0,
                humidity: parseFloat(document.getElementById('recHumidity').value) || 0,
                base_moisture: parseFloat(document.getElementById('recMoisture').value) || null,
                weather_condition: document.getElementById('recWeather').value,
                recorder: document.getElementById('recRecorder').value,
            };
            const res = await fetch('/api/environment', {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.status === 'ok') {
                clearForm();
                loadData();
            } else {
                alert(result.error || '保存失败');
            }
        }

        async function deleteRecord(id) {
            if (!confirm('确认删除这条记录？')) return;
            const res = await fetch(`/api/environment/${id}`, { method: 'DELETE' });
            const result = await res.json();
            if (result.status === 'ok') loadData();
        }

        function clearForm() {
            const fields = ['recDate','recTime','recTemp','recHumidity','recMoisture','recWeather','recRecorder'];
            fields.forEach(f => document.getElementById(f).value = '');
            document.getElementById('recDate').value = new Date().toISOString().slice(0,10);
        }

        // 初始化
        document.getElementById('recDate').value = new Date().toISOString().slice(0,10);
        loadProjects();
    </script>
</body>
</html>
