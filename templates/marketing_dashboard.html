<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>永颐金磨石 AI内容营销系统 v5.0.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei","PingFang SC",sans-serif;background:#f0f2f5;min-height:100vh}
.topbar{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:20px;font-weight:600}
.topbar .badge{background:rgba(255,255,255,0.15);padding:4px 12px;border-radius:12px;font-size:12px}
.container{max-width:1400px;margin:0 auto;padding:24px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.stat-card .num{font-size:28px;font-weight:700;color:#0f3460}
.stat-card .label{font-size:13px;color:#8898aa;margin-top:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.card h2{font-size:16px;color:#1a1a2e;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #0f3460;display:flex;align-items:center;gap:8px}
.form-row{display:flex;gap:8px;margin-bottom:12px}
.form-row input,.form-row select{flex:1;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
.form-row input:focus,.form-row select:focus{border-color:#0f3460}
.btn{background:#0f3460;color:#fff;border:none;padding:8px 20px;border-radius:8px;font-size:14px;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{background:#1a1a2e;transform:translateY(-1px)}
.btn-sm{padding:4px 12px;font-size:12px}
.btn-secondary{background:#e2e8f0;color:#4a5568}
.btn-secondary:hover{background:#cbd5e0;transform:none}
.tag{display:inline-block;background:#ebf4ff;color:#0f3460;padding:2px 10px;border-radius:12px;font-size:12px;margin:2px;cursor:pointer}
.tag:hover{background:#d4e4ff}
.result{background:#f7fafc;border-radius:8px;padding:14px;margin-top:12px;min-height:80px;font-size:13px;line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto;color:#2d3748}
.card-footer{border-top:1px solid #e2e8f0;padding:12px 24px -12px;margin:16px -24px -24px;background:#f7fafc;border-radius:0 0 12px 12px;padding:12px 24px;display:flex;gap:8px;flex-wrap:wrap}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
.toast{position:fixed;top:20px;right:20px;background:#0f3460;color:#fff;padding:12px 24px;border-radius:8px;z-index:9999;display:none;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.loading{display:none;text-align:center;padding:10px;color:#8898aa}
</style>
</head>
<body>
<div class="topbar">
<h1>永颐金磨石 AI智能内容营销系统</h1>
<span class="badge">v5.0.0</span>
</div>
<div class="container">
<div class="stats">
<div class="stat-card"><div class="num" id="kwCount">0</div><div class="label">种子关键词</div></div>
<div class="stat-card"><div class="num" id="contentCount">0</div><div class="label">已生成内容</div></div>
<div class="stat-card"><div class="num" id="compCount">0</div><div class="label">竞品跟踪</div></div>
<div class="stat-card"><div class="num" id="reportCount">0</div><div class="label">综合报告</div></div>
</div>

<div class="grid-2">
<div class="card">
<h2>关键词引擎</h2>
<div class="form-row"><input id="newKw" placeholder="输入新关键词，如：磨石地坪"><button class="btn" onclick="addKw()">添加</button></div>
<div id="kwTags"></div>
<div style="margin:14px 0;border-top:1px solid #e2e8f0;padding-top:14px">
<div class="form-row">
<select id="genGroup"><option>产品词</option><option>品牌词</option><option>场景词</option><option>工艺词</option><option>痛点词</option><option>竞品词</option></select>
<select id="genType"><option>抖音脚本</option><option>公众号文章</option><option>小红书笔记</option></select>
</div>
<button class="btn" onclick="genContent()" style="width:100%">AI 生成内容</button>
<div class="loading" id="genLoading">正在生成中...</div>
</div>
<div class="result" id="genResult">点击「AI 生成内容」按钮，自动产出营销内容</div>
</div>

<div class="card">
<h2>竞品分析</h2>
<div class="form-row"><input id="compUrl" placeholder="输入竞品名称或URL"><button class="btn" onclick="addComp()">添加</button></div>
<div id="compList"></div>
<div style="margin:14px 0;border-top:1px solid #e2e8f0;padding-top:14px">
<button class="btn" onclick="runAnalysis()" style="width:100%">执行竞品分析</button>
<div class="loading" id="analysisLoading">分析中...</div>
</div>
<div class="result" id="compResult">添加竞品后点击分析按钮</div>
</div>
</div>

<div class="card" style="margin-bottom:20px">
<h2>综合营销报告</h2>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
<button class="btn btn-sm" onclick="genReport('周报')">周报</button>
<button class="btn btn-sm" onclick="genReport('月报')">月报</button>
<button class="btn btn-sm" onclick="genReport('季报')">季报</button>
<button class="btn btn-sm" onclick="genReport('年报')">年报</button>
</div>
<div class="result" id="reportResult" style="min-height:150px">选择报告类型生成营销报告</div>
</div>

<div style="text-align:center;padding:20px;color:#8898aa;font-size:12px">永颐金磨石 AI内容营销系统 &copy; 2025 | 数据仅供参考</div>
</div>
<div class="toast" id="toast"></div>

<script>
let genCount=0, rptCount=0;

function toast(m){
 var t=document.getElementById('toast');
 t.textContent=m;
 t.style.display='block';
 setTimeout(function(){t.style.display='none'},2500);
}

async function api(url,data){
 var opt={headers:{'Content-Type':'application/json'}};
 if(data){opt.method='POST';opt.body=JSON.stringify(data)}
 var r=await fetch(url,opt);
 return r.json();
}

async function loadKw(){
 var d=await api('/marketing/api/keywords');
 var arr=Array.isArray(d)?d:d.keywords||[];
 var all=[];
 for(var k in arr){
  if(arr.hasOwnProperty(k)){
   var list=arr[k];
   if(Array.isArray(list)){all=all.concat(list)}
  }
 }
 document.getElementById('kwCount').textContent=all.length;
 var c=document.getElementById('kwTags');
 c.innerHTML='';
 all.forEach(function(kw){
  var t=document.createElement('span');
  t.className='tag';
  t.textContent=kw;
  t.onclick=function(){document.getElementById('newKw').value=kw;toast('已选择: '+kw)};
  c.appendChild(t)
 });
}

async function addKw(){
 var v=document.getElementById('newKw').value.trim();
 if(!v){toast('请输入关键词');return}
 var r=await api('/marketing/api/keywords',{action:'add',keyword:v});
 document.getElementById('newKw').value='';
 loadKw();
 toast('关键词已添加: '+v);
}

async function genContent(){
 var kw=document.querySelector('.tag');
 if(!kw){toast('请先点击选择一个关键词');return}
 var keyword=kw.textContent;
 var group=document.getElementById('genGroup').value;
 document.getElementById('genLoading').style.display='block';
 document.getElementById('genResult').textContent='';
 var r=await api('/marketing/api/generate',{keyword:keyword,group:group});
 document.getElementById('genLoading').style.display='none';
 var box=document.getElementById('genResult');
 var txt='';
 if(r.video){txt='[抖音脚本]\n'+r.video+'\n\n'}
 if(r.article){txt+='[公众号文章]\n'+r.article}
 if(r.xhs){txt+='\n\n[小红书笔记]\n'+r.xhs}
 box.textContent=txt||r.content||JSON.stringify(r);
 genCount++;
 document.getElementById('contentCount').textContent=genCount;
 toast('内容生成成功!');
}

async function addComp(){
 var v=document.getElementById('compUrl').value.trim();
 if(!v){toast('请输入竞品名称');return}
 var r=await api('/marketing/api/competitors',{url:v});
 document.getElementById('compUrl').value='';
 loadComp();
 toast('竞品已添加: '+v);
}

async function loadComp(){
 var d=await api('/marketing/api/competitors');
 var arr=Array.isArray(d)?d:d.competitors||[];
 document.getElementById('compCount').textContent=arr.length;
 var c=document.getElementById('compList');
 c.innerHTML='';
 arr.forEach(function(item){
  var t=document.createElement('span');
  t.className='tag';
  t.textContent=item.name||item.url||JSON.stringify(item);
  c.appendChild(t)
 });
}

async function runAnalysis(){
 document.getElementById('analysisLoading').style.display='block';
 document.getElementById('compResult').textContent='';
 var r=await api('/marketing/api/analysis');
 document.getElementById('analysisLoading').style.display='none';
 var box=document.getElementById('compResult');
 var txt='';
 if(r.analysis){
  var a=r.analysis;
  if(a.our_advantage){txt+='【我们的优势】\n'+a.our_advantage.join('、')+'\n\n'}
  if(a.strategy){txt+='【策略建议】\n'+a.strategy.join('、')+'\n\n'}
  if(a.result){txt+='【预期效果】\n曝光:'+a.result.exposure+' 线索:'+a.result.leads+' ROI:'+a.result.roi}
 }
 box.textContent=txt||r.report||JSON.stringify(r);
 toast('分析完成');
}

async function genReport(type){
 document.getElementById('reportResult').textContent='正在生成'+type+'...';
 var r=await api('/marketing/api/report',{type:type});
 var box=document.getElementById('reportResult');
 var txt='';
 if(r.report){
  var m=r.report.metrics;
  var roi=r.report.roi;
  txt='【营销报告 - '+type+'】\n';
  txt+='关键词数: '+m.keywords+' | 日均内容: '+m.daily+' | 月均内容: '+m.monthly+' | 竞品数: '+m.competitors+'\n\n';
  txt+='【ROI分析】\n';
  txt+='投入: '+roi.investment+' | 曝光: '+roi.exposure+' | 线索: '+roi.leads+' | ROI: '+roi.estimate;
 }
 box.textContent=txt||r.summary||JSON.stringify(r);
 rptCount++;
 document.getElementById('reportCount').textContent=rptCount;
 toast(type+'生成成功');
}

loadKw();
loadComp();
</script>
</body>
</html>
