<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <meta name="description" content="永颐无机磨石施工管理平台 - 页面未找到">
    <link rel="canonical" href="https://ai.jinmojianshe.com/platform/">
    <title>404 - 页面未找到 - 永颐施工平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>!function(){var t=localStorage.getItem("yongyi_theme")||"light";document.documentElement.setAttribute("data-theme",t)}()</script>
    <style>
        .error-page { display:flex;align-items:center;justify-content:center;min-height:70vh;padding:40px 20px; }
        .error-card { text-align:center;max-width:500px; }
        .error-code { font-size:6rem;font-weight:800;background:linear-gradient(135deg,#e74c3c,#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:16px; }
        .error-title { font-size:1.5rem;color:var(--text-color,#333);margin-bottom:12px; }
        .error-desc { color:var(--text-secondary,#888);margin-bottom:24px;line-height:1.6; }
        .error-actions { display:flex;gap:12px;justify-content:center;flex-wrap:wrap; }
        .error-actions .btn { padding:10px 24px;font-size:0.9rem; }
    </style>
</head>
<body>
{% include 'sidebar.html' %}
<main class="main-content" style="max-width:800px;margin:0 auto;">
    <div class="error-page">
        <div class="error-card">
            <div class="error-code">404</div>
            <div class="error-title">🌐 页面未找到</div>
            <div class="error-desc">
                您访问的页面不存在或已被移除。<br>
                请检查网址是否正确，或返回首页使用导航菜单。
            </div>
            <div class="error-actions">
                <a href="/" class="btn btn-primary">🏠 返回首页</a>
                <a href="javascript:history.back()" class="btn" style="background:#eee;">⬅️ 返回上一页</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
