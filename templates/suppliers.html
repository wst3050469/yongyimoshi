<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应商管理 - 永颐施工平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .supplier-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .supplier-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .supplier-card h3 { margin: 0 0 8px; font-size: 1.1rem; }
        .supplier-card .info { font-size: 0.85rem; color: #666; line-height: 1.7; }
        .supplier-card .info span { color: #333; }
        .stars { color: #f59e0b; letter-spacing: 2px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal h2 { margin: 0 0 16px; font-size: 1.2rem; }
        .modal .form-row { margin-bottom: 12px; }
        .modal label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .price-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.85rem; }
        .price-table th { background: #f5f5f5; text-align: left; padding: 6px 8px; }
        .price-table td { padding: 6px 8px; border-bottom: 1px solid #eee; }
        .tag { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; margin: 2px; }
    </style>
</head>
<body>
<header class="app-header no-print">
    <h1>🏢 供应商管理</h1>
    <div class="subtitle">材料供应商 · 报价追踪 · 价格对比 | <a href="/" style="color:white;">← 返回主平台</a></div>
</header>

<main class="main-content">
    <div class="card" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <h2 style="margin:0;">供应商名录 <span id="supplierCount" style="font-weight:400;font-size:0.9rem;color:#888;"></span></h2>
        <div class="action-bar no-print" style="margin:0;">
            <button class="btn btn-primary" onclick="openAddModal()">➕ 新增供应商</button>
        </div>
    </div>

    <div id="supplierList" class="supplier-grid">
        <div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">加载中...</div>
    </div>

    <!-- 新增/编辑供应商弹窗 -->
    <div class="modal-overlay" id="supplierModal">
        <div class="modal">
            <h2 id="modalTitle">新增供应商</h2>
            <div class="form-row">
                <label>供应商名称 *</label>
                <input id="s_name" placeholder="如: XX建材有限公司">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="form-row">
                    <label>联系人</label>
                    <input id="s_contact" placeholder="姓名">
                </div>
                <div class="form-row">
                    <label>联系电话</label>
                    <input id="s_phone" placeholder="手机号">
                </div>
            </div>
            <div class="form-row">
                <label>地址</label>
                <input id="s_address" placeholder="详细地址">
            </div>
            <div class="form-row">
                <label>供应材料（逗号分隔）</label>
                <input id="s_materials" placeholder="如: 硅酸盐水泥, 钢纤维, 石英砂">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="form-row">
                    <label>评分 (1-5)</label>
                    <select id="s_rating">
                        <option value="5">⭐⭐⭐⭐⭐</option>
                        <option value="4">⭐⭐⭐⭐</option>
                        <option value="3" selected>⭐⭐⭐</option>
                        <option value="2">⭐⭐</option>
                        <option value="1">⭐</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <label>备注</label>
                <textarea id="s_notes" rows="2" placeholder="其他信息..."></textarea>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
                <button class="btn" onclick="closeModal()" style="background:#eee;">取消</button>
                <button class="btn btn-primary" onclick="saveSupplier()">💾 保存</button>
            </div>
        </div>
    </div>

    <!-- 报价详情弹窗 -->
    <div class="modal-overlay" id="priceModal">
        <div class="modal">
            <h2 id="priceModalTitle">报价管理</h2>
            <div id="priceContent"></div>
        </div>
    </div>

    <div class="no-print" style="text-align:center;padding:16px;color:#999;font-size:0.8rem;">
        永颐无机磨石 · 施工管理平台 v3.8
    </div>
</main>

<script>
let editingId = null;
const VALID_MATERIALS = ["硅酸盐水泥","钢纤维","石英砂","SE-100渗透剂","SE-200固化剂","SE-300色粉"];

function loadSuppliers() {
    document.getElementById('supplierList').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">加载中...</div>';
    fetch('/api/suppliers')
    .then(r => r.json())
    .then(suppliers => {
        document.getElementById('supplierCount').textContent = `(共${suppliers.length}家)`;
        const container = document.getElementById('supplierList');
        if (suppliers.length === 0) {
            container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">暂无供应商，点击上方按钮添加</div>';
            return;
        }
        container.innerHTML = suppliers.map(s => {
            let mats = [];
            try { mats = JSON.parse(s.materials || '[]'); } catch(e) {}
            const stars = '★'.repeat(s.rating) + '☆'.repeat(5 - s.rating);
            return `
                <div class="supplier-card">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <h3>${s.name}</h3>
                        <div class="stars">${stars}</div>
                    </div>
                    <div class="info">
                        <div>📞 <span>${s.phone || '未填写'}</span>　👤 <span>${s.contact_person || '-'}</span></div>
                        <div>📍 <span>${s.address || '未填写'}</span></div>
                        <div style="margin-top:6px;">${mats.map(m => '<span class="tag">' + m + '</span>').join('')}</div>
                    </div>
                    <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">
                        <button class="btn" onclick="showPrices(${s.id}, '${s.name}')" style="font-size:0.8rem;padding:4px 12px;">💰 报价(${s.price_count||0})</button>
                        <button class="btn" onclick="editSupplier(${s.id})" style="font-size:0.8rem;padding:4px 12px;background:#e3f2fd;">✏️ 编辑</button>
                        <button class="btn" onclick="deleteSupplier(${s.id})" style="font-size:0.8rem;padding:4px 12px;background:#fce4ec;color:#c62828;">🗑️</button>
                    </div>
                </div>
            `;
        }).join('');
    });
}

function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '➕ 新增供应商';
    ['s_name','s_contact','s_phone','s_address','s_materials','s_notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('s_rating').value = '3';
    document.getElementById('supplierModal').classList.add('active');
}

function closeModal() {
    document.getElementById('supplierModal').classList.remove('active');
    document.getElementById('priceModal').classList.remove('active');
}

function saveSupplier() {
    const data = {
        name: document.getElementById('s_name').value.trim(),
        contact_person: document.getElementById('s_contact').value.trim(),
        phone: document.getElementById('s_phone').value.trim(),
        address: document.getElementById('s_address').value.trim(),
        materials: document.getElementById('s_materials').value.split(/[,，]/).map(s => s.trim()).filter(Boolean),
        rating: parseInt(document.getElementById('s_rating').value),
        notes: document.getElementById('s_notes').value.trim(),
    };
    if (!data.name) { showToast('⚠️ 供应商名称不能为空', 'warning'); return; }

    const url = editingId ? `/api/suppliers/${editingId}` : '/api/suppliers';
    const method = editingId ? 'PUT' : 'POST';

    fetch(url, {
        method, headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(d => {
        if (d.status === 'ok') {
            showToast(editingId ? '✅ 已更新供应商' : '✅ 已添加供应商');
            closeModal();
            loadSuppliers();
        }
    });
}

function editSupplier(sid) {
    fetch(`/api/suppliers/${sid}`)
    .then(r => r.json())
    .then(s => {
        editingId = s.id;
        document.getElementById('modalTitle').textContent = '✏️ 编辑供应商';
        document.getElementById('s_name').value = s.name || '';
        document.getElementById('s_contact').value = s.contact_person || '';
        document.getElementById('s_phone').value = s.phone || '';
        document.getElementById('s_address').value = s.address || '';
        document.getElementById('s_materials').value = (s.materials_list || []).join(', ');
        document.getElementById('s_rating').value = s.rating || 3;
        document.getElementById('s_notes').value = s.notes || '';
        document.getElementById('supplierModal').classList.add('active');
    });
}

function deleteSupplier(sid) {
    if (!confirm('确定要删除该供应商吗？')) return;
    fetch(`/api/suppliers/${sid}`, {method: 'DELETE'})
    .then(r => r.json())
    .then(d => {
        showToast('🗑️ 已删除');
        loadSuppliers();
    });
}

function showPrices(sid, name) {
    document.getElementById('priceModalTitle').textContent = `💰 ${name} - 报价历史`;
    const content = document.getElementById('priceContent');
    content.innerHTML = `
        <div style="margin-bottom:12px;">
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <select id="p_material" style="flex:1;">
                    ${VALID_MATERIALS.map(m => `<option value="${m}">${m}</option>`).join('')}
                </select>
                <input id="p_price" type="number" step="0.01" placeholder="单价(元/kg)" style="width:120px;">
                <input id="p_date" type="date" value="${new Date().toISOString().split('T')[0]}" style="width:140px;">
                <button class="btn btn-primary" onclick="addPrice(${sid})">添加报价</button>
            </div>
        </div>
        <div id="priceHistory">加载中...</div>
        <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end;">
            <button class="btn" onclick="closeModal()" style="background:#eee;">关闭</button>
        </div>
    `;
    document.getElementById('priceModal').classList.add('active');
    loadPriceHistory(sid);
}

function loadPriceHistory(sid) {
    fetch(`/api/suppliers/${sid}/prices`)
    .then(r => r.json())
    .then(prices => {
        const div = document.getElementById('priceHistory');
        if (prices.length === 0) {
            div.innerHTML = '<div style="text-align:center;padding:20px;color:#999;">暂无报价记录</div>';
            return;
        }
        div.innerHTML = `
            <table class="price-table">
                <thead><tr><th>材料</th><th>单价(元/kg)</th><th>报价日期</th><th>备注</th></tr></thead>
                <tbody>
                    ${prices.map(p => `
                        <tr>
                            <td><strong>${p.material_name}</strong></td>
                            <td style="color:#e65100;font-weight:700;">¥${p.unit_price.toFixed(2)}</td>
                            <td>${p.price_date}</td>
                            <td style="color:#888;font-size:0.8rem;">${p.notes||'-'}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    });
}

function addPrice(sid) {
    const material = document.getElementById('p_material').value;
    const price = parseFloat(document.getElementById('p_price').value);
    const date = document.getElementById('p_date').value;
    if (!price || price <= 0) { showToast('⚠️ 请输入有效的单价', 'warning'); return; }
    fetch(`/api/suppliers/${sid}/prices`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({material_name: material, unit_price: price, price_date: date})
    })
    .then(r => r.json())
    .then(d => {
        if (d.status === 'ok') {
            showToast('✅ 报价已添加');
            document.getElementById('p_price').value = '';
            loadPriceHistory(sid);
        }
    });
}

// 点击遮罩关闭
document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', e => { if (e.target === el) closeModal(); });
});

document.addEventListener('DOMContentLoaded', loadSuppliers);
</script>
</body>
</html>
